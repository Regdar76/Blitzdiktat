version: 2

updates:
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly

  - package-ecosystem: pip
    directory: /BlitzdiktatWin
    schedule:
      interval: weekly
    open-pull-requests-limit: 5

  - package-ecosystem: gradle
    directory: /BlitzdiktatAndroid
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
