name: CI

on:
  pull_request:
  push:
    branches:
      - main

# Überholte Läufe desselben Branches abbrechen — spart v. a. den
# 30-Minuten-macOS-Job bei schnell aufeinanderfolgenden Pushes.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  check-windows:
    name: Check Windows app
    runs-on: windows-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v7
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: BlitzdiktatWin/requirements.txt

      - name: Install dependencies
        run: pip install -r BlitzdiktatWin/requirements.txt ruff pytest

      - name: Lint (errors only)
        run: ruff check --select E9,F63,F7,F82 BlitzdiktatWin

      - name: Compile check
        run: python -W error::SyntaxWarning -m compileall -q BlitzdiktatWin

      - name: Tests
        run: python -m pytest BlitzdiktatWin/tests -q

  check-android:
    name: Check Android app
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up JDK
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v6

      - name: Unit tests and debug build
        run: |
          chmod +x gradlew
          ./gradlew --no-daemon :app:testDebugUnitTest :app:assembleDebug
        working-directory: BlitzdiktatAndroid

  build-macos:
    name: Build macOS app
    runs-on: macos-14
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Secret hygiene scan
        run: |
          patterns_file=.github/secret-scan-patterns.txt
          if [ ! -f "$patterns_file" ]; then
            echo "Missing $patterns_file"
            exit 1
          fi
          pattern="$(grep -vE '^[[:space:]]*(#|$)' "$patterns_file" | paste -sd'|' -)"
          if [ -z "$pattern" ]; then
            echo "No patterns loaded from $patterns_file"
            exit 1
          fi
          if grep -RInE \
              --exclude-dir=.git \
              --exclude=secret-scan-patterns.txt \
              "$pattern" .; then
            echo "Potential secret or private project reference found."
            exit 1
          fi

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_16.2.app || sudo xcode-select -s /Applications/Xcode.app

      - name: Install XcodeGen
        run: |
          if ! command -v xcodegen >/dev/null 2>&1; then
            brew install xcodegen
          fi

      - name: Build
        run: ./build.sh --debug
